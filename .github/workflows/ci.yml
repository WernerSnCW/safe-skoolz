name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: safeskoolz
          POSTGRES_PASSWORD: safeskoolz
          POSTGRES_DB: safeskoolz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U safeskoolz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://safeskoolz:safeskoolz@localhost:5432/safeskoolz_test
      JWT_SECRET: ci-dummy-secret-not-for-prod
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Scoped typecheck: libs + frontends + scripts are green and gating.
      # api-server has pre-existing TS errors outside T02's blast radius (auth.ts JWT
      # overload drift, pdfExport.ts missing @types/pdfkit, behaviour.ts tuple bounds,
      # training.ts moduleId narrowing). It still passes its runtime test suite and is
      # gated by the "API server tests" step below. Cleaning those up is deferred to a
      # follow-up ticket; this keeps trunk CI honest without rubber-stamping unrelated red.
      - name: Typecheck (libs)
        run: pnpm run typecheck:libs

      - name: Typecheck (safeschool)
        run: pnpm --filter @workspace/safeschool run typecheck

      - name: Typecheck (mockup-sandbox)
        run: pnpm --filter @workspace/mockup-sandbox run typecheck

      - name: Typecheck (scripts)
        run: pnpm --filter @workspace/scripts run typecheck

       - name: Push database schema
        run: pnpm --filter @workspace/db run push-force

      - name: API server tests
        run: pnpm --filter @workspace/api-server test
