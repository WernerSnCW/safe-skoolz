name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: safeskoolz
          POSTGRES_PASSWORD: safeskoolz
          POSTGRES_DB: safeskoolz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U safeskoolz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://safeskoolz:safeskoolz@localhost:5432/safeskoolz_test
      JWT_SECRET: ci-dummy-secret-not-for-prod
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: API server tests
        run: pnpm --filter @workspace/api-server test
