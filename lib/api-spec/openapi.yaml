openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: SafeSchool safeguarding and incident reporting API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: schools
    description: School management
  - name: users
    description: User management
  - name: incidents
    description: Incident reporting
  - name: protocols
    description: Safeguarding protocols
  - name: alerts
    description: Pattern alerts
  - name: notifications
    description: User notifications
  - name: dashboard
    description: Dashboard data
  - name: pta
    description: PTA portal

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/pupil/start:
    post:
      operationId: pupilStartLogin
      tags: [auth]
      summary: Start pupil login with school access code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PupilStartBody"
      responses:
        "200":
          description: Login session started with profile tiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PupilStartResponse"
        "401":
          description: Invalid access code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/pupil/login:
    post:
      operationId: pupilLogin
      tags: [auth]
      summary: Complete pupil login with session token, profile key, and PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PupilLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/staff/login:
    post:
      operationId: staffLogin
      tags: [auth]
      summary: Staff login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/parent/login:
    post:
      operationId: parentLogin
      tags: [auth]
      summary: Parent login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schools:
    get:
      operationId: listSchools
      tags: [schools]
      summary: List all schools
      responses:
        "200":
          description: School list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/School"


  /schools/{schoolId}/staff:
    get:
      operationId: listStaffBySchool
      tags: [users]
      summary: List staff for a school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/avatar:
    post:
      operationId: updateAvatar
      tags: [users]
      summary: Update user avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarBody"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"

  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIncidents"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Create a new incident report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentBody"
      responses:
        "201":
          description: Incident created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /incidents/{id}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get incident by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Incident detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /incidents/{id}/status:
    patch:
      operationId: updateIncidentStatus
      tags: [incidents]
      summary: Update incident status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{id}/assess:
    patch:
      operationId: assessIncident
      tags: [incidents]
      summary: Add assessment to incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessIncidentBody"
      responses:
        "200":
          description: Assessment saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /protocols:
    get:
      operationId: listProtocols
      tags: [protocols]
      summary: List protocols
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated protocols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProtocols"
    post:
      operationId: createProtocol
      tags: [protocols]
      summary: Open a new protocol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProtocolBody"
      responses:
        "201":
          description: Protocol created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /protocols/{id}:
    get:
      operationId: getProtocol
      tags: [protocols]
      summary: Get protocol detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Protocol detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProtocol
      tags: [protocols]
      summary: Update protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProtocolBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List pattern alerts
      parameters:
        - name: level
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAlerts"

  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Update alert status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlertBody"
      responses:
        "200":
          description: Alert updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternAlert"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNotifications"

  /notifications/{id}/acknowledge:
    patch:
      operationId: acknowledgeNotification
      tags: [notifications]
      summary: Acknowledge a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /dashboard/coordinator:
    get:
      operationId: getCoordinatorDashboard
      tags: [dashboard]
      summary: Get coordinator dashboard stats
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoordinatorDashboard"

  /dashboard/child/{id}:
    get:
      operationId: getChildDashboard
      tags: [dashboard]
      summary: Get child safeguarding profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Child dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildDashboard"

  /pta/dashboard:
    get:
      operationId: getPtaDashboard
      tags: [pta]
      summary: Anonymised PTA safeguarding health dashboard
      responses:
        "200":
          description: PTA dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtaDashboard"

  /pta/announcements/feed:
    get:
      operationId: getPtaAnnouncementFeed
      tags: [pta]
      summary: Announcements visible to the current user (parent feed)
      responses:
        "200":
          description: Feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        body: { type: string }
                        audience: { type: string }
                        pinned: { type: boolean }
                        createdAt: { type: string }
                        author: { type: string }

  /pta/announcements:
    get:
      operationId: listPtaAnnouncements
      tags: [pta]
      summary: PTA announcements (published log)
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        body: { type: string }
                        audience: { type: string }
                        pinned: { type: boolean }
                        createdAt: { type: string }
                        author: { type: string }
    post:
      operationId: postPtaAnnouncement
      tags: [pta]
      summary: Publish a PTA announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
                audience: { type: string }
                pinned: { type: boolean }
              required: [title, body]
      responses:
        "201":
          description: Published
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement: { type: object }
  /pta/announcements/{id}:
    delete:
      operationId: deletePtaAnnouncement
      tags: [pta]
      summary: Delete a PTA announcement
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /pta/ballots:
    get:
      operationId: listPtaBallots
      tags: [pta]
      summary: Ballots with live tally and quorum status
      responses:
        "200":
          description: Ballots
          content:
            application/json:
              schema:
                type: object
                properties:
                  rosterActive: { type: number }
                  isMember: { type: boolean }
                  ballots:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        question: { type: string }
                        description: { type: string, nullable: true }
                        options: { type: array, items: { type: string } }
                        status: { type: string }
                        quorum: { type: number, nullable: true }
                        closesAt: { type: string, nullable: true }
                        createdAt: { type: string }
                        tally: { type: object, additionalProperties: { type: number } }
                        totalVotes: { type: number }
                        quorumMet: { type: boolean, nullable: true }
                        myVote: { type: string, nullable: true }
    post:
      operationId: openPtaBallot
      tags: [pta]
      summary: Open a ballot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question: { type: string }
                description: { type: string }
                options: { type: array, items: { type: string } }
                quorum: { type: number }
                closesAt: { type: string }
                proposalId: { type: string }
              required: [question]
      responses:
        "201":
          description: Opened
          content:
            application/json:
              schema:
                type: object
                properties:
                  ballot: { type: object }
  /pta/ballots/{id}/close:
    post:
      operationId: closePtaBallot
      tags: [pta]
      summary: Close a ballot
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ballot: { type: object }
  /pta/ballots/{id}/vote:
    post:
      operationId: castPtaVote
      tags: [pta]
      summary: Cast a vote (self or by proxy)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                choice: { type: string }
                memberId: { type: string }
              required: [choice]
      responses:
        "201":
          description: Vote cast
          content:
            application/json:
              schema:
                type: object
                properties:
                  vote: { type: object }
  /pta/proxies:
    get:
      operationId: listPtaProxies
      tags: [pta]
      summary: Standing proxies (grantor to holder)
      responses:
        "200":
          description: Proxies
          content:
            application/json:
              schema:
                type: object
                properties:
                  myMemberId: { type: string, nullable: true }
                  proxies:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        grantorMemberId: { type: string }
                        holderMemberId: { type: string }
                        grantor: { type: string }
                        holder: { type: string }
    post:
      operationId: setPtaProxy
      tags: [pta]
      summary: Set my standing proxy holder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                holderMemberId: { type: string }
              required: [holderMemberId]
      responses:
        "201":
          description: Proxy set
          content:
            application/json:
              schema:
                type: object
                properties:
                  proxy: { type: object }
    delete:
      operationId: revokePtaProxy
      tags: [pta]
      summary: Revoke my standing proxy
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /pta/proposals:
    get:
      operationId: listPtaProposals
      tags: [pta]
      summary: The PTA decision log
      responses:
        "200":
          description: Proposals list
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposals:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        detail: { type: string }
                        category: { type: string }
                        status: { type: string }
                        decisionDueAt: { type: string, nullable: true }
                        decisionRationale: { type: string, nullable: true }
                        decidedAt: { type: string, nullable: true }
                        createdAt: { type: string }
                        raisedBy: { type: string }
                        decidedBy: { type: string, nullable: true }
                        overdue: { type: boolean }
    post:
      operationId: raisePtaProposal
      tags: [pta]
      summary: Raise a proposal for decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                detail: { type: string }
                category: { type: string }
                decisionDueAt: { type: string }
              required: [title, detail]
      responses:
        "201":
          description: Raised
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal: { type: object }
  /pta/proposals/{id}/decide:
    post:
      operationId: decidePtaProposal
      tags: [pta]
      summary: Record an explicit decision on a proposal
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome: { type: string }
                rationale: { type: string }
              required: [outcome]
      responses:
        "200":
          description: Decided
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal: { type: object }
  /pta/proposals/{id}/withdraw:
    post:
      operationId: withdrawPtaProposal
      tags: [pta]
      summary: Withdraw an open proposal
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Withdrawn
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal: { type: object }

  /pta/members:
    get:
      operationId: listPtaMembers
      tags: [pta]
      summary: List PTA members with their active officer roles
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        userId: { type: string }
                        name: { type: string }
                        email: { type: string }
                        tier: { type: string }
                        status: { type: string }
                        joinedAt: { type: string }
                        offices:
                          type: array
                          items:
                            type: object
                            properties:
                              role: { type: string }
                              domain: { type: string, nullable: true }
    post:
      operationId: addPtaMember
      tags: [pta]
      summary: Add a PTA member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                tier: { type: string }
                status: { type: string }
              required: [userId]
      responses:
        "201":
          description: Member created
          content:
            application/json:
              schema:
                type: object
                properties:
                  member: { type: object }
  /pta/members/candidates:
    get:
      operationId: listPtaMemberCandidates
      tags: [pta]
      summary: School users (parents/PTA) not yet members
      responses:
        "200":
          description: Candidate users
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        email: { type: string }
                        role: { type: string }
  /pta/members/{id}:
    patch:
      operationId: updatePtaMember
      tags: [pta]
      summary: Update a PTA member's tier or status
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tier: { type: string }
                status: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member: { type: object }
    delete:
      operationId: removePtaMember
      tags: [pta]
      summary: Remove a PTA member (and end their officer appointments)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
  /pta/officers:
    get:
      operationId: listPtaOfficers
      tags: [pta]
      summary: List active PTA officers
      responses:
        "200":
          description: Officers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  officers:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        memberId: { type: string }
                        name: { type: string }
                        role: { type: string }
                        domain: { type: string, nullable: true }
                        termStartAt: { type: string }
                        active: { type: boolean }
    post:
