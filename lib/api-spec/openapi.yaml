        "200":
          description: Aggregated results
          content:
            application/json:
              schema:
                type: object
                required: [title, released, totalResponses, questions]
                properties:
                  title: { type: string }
                  released: { type: boolean }
                  releasedAt: { type: string }
                  isExec: { type: boolean }
                  totalResponses: { type: integer }
                  questions:
                    type: array
                    items:
                      type: object
                      required: [key, section, text, options, distribution, segments]
                      properties:
                        key: { type: string }
                        section: { type: string }
                        text: { type: string }
                        type: { type: string }
                        options: { type: array, items: { type: string } }
                        distribution: { type: array, items: { type: integer } }
                        segments:
                          type: array
                          items:
                            type: object
                            required: [yearGroup, n, distribution]
                            properties:
                              yearGroup: { type: string }
                              n: { type: integer }
                              distribution: { type: array, items: { type: integer } }
                  freeText:
                    type: array
                    items:
                      type: object
                      properties:
                        questionKey: { type: string }
                        text: { type: string }
        "401": { description: Unauthorized }
        "403": { description: Not released / not your school }
        "404": { description: Not found }

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Email+password sign-up that logs the parent in instantly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, schoolSlug]
              properties:
                email: { type: string }
                password: { type: string }
                name: { type: string }
                schoolSlug: { type: string }
      responses:
        "201":
          description: Created and logged in
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token: { type: string }
                  user: { type: object }
                  firstLogin: { type: boolean }
        "400": { description: Invalid input }
        "404": { description: School not found }
        "409": { description: Email already registered }
  /join/{slug}:
    get:
      operationId: getJoinSummary
      tags: [join]
      summary: Public school + vibes summary for the front door
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: object
                required: [schoolName, voiceName, joinCount, hasVibes]
                properties:
                  schoolName: { type: string }
                  voiceName: { type: string }
                  mission: { type: string }
                  joinCount: { type: integer }
                  hasVibes: { type: boolean }
        "404": { description: Not found }
  /tenant/{slug}:
    get:
      operationId: getTenant
      summary: Public tenant config for the unified shell
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Resolved tenant config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "404":
          description: Tenant not found
  /concerns:
    post:
      operationId: submitConcern
      tags: [concerns]
      summary: Submit a community concern
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: string }
        "400": { description: Invalid input }
    get:
      operationId: listConcerns
      tags: [concerns]
      summary: List concerns for the exec's school
      responses:
        "200":
          description: Concerns
          content:
            application/json:
              schema:
                type: object
                required: [concerns]
                properties:
                  concerns:
                    type: array
                    items:
                      type: object
                      required: [id, body, status, createdAt, firstName, lastName]
                      properties:
                        id: { type: string }
                        body: { type: string }
                        status: { type: string }
                        createdAt: { type: string }
                        firstName: { type: string }
                        lastName: { type: string }
        "403": { description: Insufficient permissions }
  /concerns/{id}/status:
    post:
      operationId: setConcernStatus
      tags: [concerns]
      summary: Triage a concern by setting its status
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid input }
        "404": { description: Not found }
  /schools/search:
    get:
      operationId: searchSchools
      tags: [schools]
      summary: Public school finder (name match + whether it has a Vibes group)
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Matching schools
          content:
            application/json:
              schema:
                type: object
                required: [schools]
                properties:
                  schools:
                    type: array
                    items:
                      type: object
                      required: [name, hasVibes]
                      properties:
                        slug: { type: string, nullable: true }
                        name: { type: string }
                        hasVibes: { type: boolean }
  /schools/create-request:
    post:
      operationId: requestSchoolCreate
      tags: [schools]
      summary: Queue a request to create a Vibes for a school not yet in the directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [schoolName, email]
              properties:
                schoolName: { type: string }
                email: { type: string }
                note: { type: string }
      responses:
        "201":
          description: Request queued
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid input }

  /pta/charter:
    get:
      operationId: getPtaCharter
      tags: [pta]
      summary: Operating-structure charter content + claim status (authed)
      responses:
        "200":
          description: Charter
          content:
            application/json:
              schema:
                type: object
                required: [version, title, sections, claimed, youAcknowledged, officers, acknowledgements]
                properties:
                  version: { type: string }
                  title: { type: string }
                  youAcknowledged: { type: boolean }
                  sections:
                    type: array
                    items:
                      type: object
                      required: [heading, body]
                      properties:
                        heading: { type: string }
                        body: { type: string }
                  claimed: { type: boolean }
                  claimedAt: { type: string }
                  officers:
                    type: array
                    items:
                      type: object
                      properties:
                        role: { type: string }
                        domain: { type: string }
                        name: { type: string }
                  acknowledgements:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        actionType: { type: string }
                        createdAt: { type: string }
        "401": { description: Unauthorized }
  /pta/charter/adopt:
    post:
      operationId: adoptPtaCharter
      tags: [pta]
      summary: Admin adopts the operating structure, claiming the PTA
      responses:
        "200":
          description: Claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  claimedAt: { type: string }
        "403": { description: Forbidden }
  /pta/charter/acknowledge:
    post:
      operationId: acknowledgePtaCharter
      tags: [pta]
      summary: An officer acknowledges the charter
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

