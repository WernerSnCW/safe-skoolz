      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: VOICE detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  voice:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      mission: { type: string }
                      status: { type: string }
                      createdAt: { type: string }
                      convertedAt: { type: string, nullable: true }
                      createdBy: { type: string }
                      memberCount: { type: integer }
                      myRole: { type: string, nullable: true }
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            userId: { type: string }
                            role: { type: string }
                            joinedAt: { type: string }
                            name: { type: string }
